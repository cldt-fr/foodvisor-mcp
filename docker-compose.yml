services:
  foodvisor-mcp:
    build: .
    image: ghcr.io/cldt-fr/foodvisor-mcp:latest
    container_name: foodvisor-mcp
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
